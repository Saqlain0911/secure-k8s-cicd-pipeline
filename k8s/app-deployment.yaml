apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-k8s-app
  template:
    metadata:
      labels:
        app: secure-k8s-app
    spec:
      containers:
        - name: secure-k8s-app
          image: secure-k8s-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-credentials
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10